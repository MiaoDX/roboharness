name: Build CI Docker Image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "Dockerfile.gpu"
      - "pyproject.toml"
  schedule:
    # Weekly rebuild (Monday 06:00 UTC) to pick up dependency updates
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_CI: ghcr.io/${{ github.repository }}/ci
  IMAGE_GPU: ghcr.io/${{ github.repository }}/ci-gpu

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: lower
        run: echo "image=${IMAGE_CI,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.lower.outputs.image }}:latest
            ${{ steps.lower.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-gpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: lower
        run: echo "image=${IMAGE_GPU,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push GPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.gpu
          push: true
          tags: |
            ${{ steps.lower.outputs.image }}:latest
            ${{ steps.lower.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
